<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Money Management Portal | Money Manager</title>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="background-animation"></div>

    <div class="container glassmorphism">
        <header>
            <h1><i class="fa-solid fa-wallet"></i>Varsha's Wealth Manager</h1>
        </header>

        <section class="dashboard">
            <div class="balance-card">
                <h2>Total Balance</h2>
                <h1 id="balance">$0.00</h1>
            </div>

            <div class="summary">
                <div class="income-card">
                    <div class="icon"><i class="fa-solid fa-arrow-trend-up"></i></div>
                    <div>
                        <h3>Income</h3>
                        <p id="money-plus" class="money plus">+$0.00</p>
                    </div>
                </div>
                <div class="expense-card">
                    <div class="icon"><i class="fa-solid fa-arrow-trend-down"></i></div>
                    <div>
                        <h3>Expense</h3>
                        <p id="money-minus" class="money minus">-$0.00</p>
                    </div>
                </div>
            </div>
        </section>

        <section class="main-content">
            <div class="add-transaction glass-panel">
                <h3>Add New Transaction</h3>
                <form id="form">
                    <div class="form-control">
                        <label for="text">Description</label>
                        <input type="text" id="text" placeholder="e.g. Salary, Rent, Groceries" autocomplete="off" />
                    </div>
                    <div class="form-control">
                        <label for="amount">Amount <br /><small>(negative = expense, positive = income)</small></label>
                        <input type="number" id="amount" placeholder="0.00" step="0.01" />
                    </div>
                    <button class="btn" type="submit">Add Transaction</button>
                </form>
            </div>

            <div class="transaction-history glass-panel">
                <h3>Recent History</h3>
                <ul id="list" class="list">
                    <!-- Dynamic transactions go here -->
                </ul>
            </div>
        </section>
    </div>

    <script src="app.js"></script>
</body>

</html>
